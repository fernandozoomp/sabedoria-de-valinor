<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            width: 1080px;
            height: 1920px;
            background: #0D1117;
            font-family: Georgia, 'Times New Roman', serif;
            color: #F0E6D3;
            position: relative;
            overflow: hidden;
        }
        .frame {
            position: absolute;
            inset: 40px;
            border: 3px solid #C9A84C;
            border-radius: 8px;
        }
        .corner { position: absolute; width: 80px; height: 80px; border: 3px solid #C9A84C; }
        .corner-tl { top: 20px; left: 20px; border-right: none; border-bottom: none; }
        .corner-tr { top: 20px; right: 20px; border-left: none; border-bottom: none; }
        .corner-bl { bottom: 20px; left: 20px; border-right: none; border-top: none; }
        .corner-br { bottom: 20px; right: 20px; border-left: none; border-top: none; }
        .title {
            text-align: center;
            padding: 80px 60px 30px;
        }
        .title h1 {
            font-size: 52px;
            color: #C9A84C;
            text-shadow: 0 2px 10px rgba(201,168,76,0.3);
            letter-spacing: 3px;
        }
        .title .subtitle {
            font-size: 26px;
            color: #A8B2C1;
            margin-top: 10px;
            font-style: italic;
        }
        .timeline {
            position: absolute;
            top: 240px;
            left: 120px;
            right: 120px;
            bottom: 160px;
        }
        .line {
            position: absolute;
            left: 50%;
            top: 0;
            bottom: 0;
            width: 4px;
            background: linear-gradient(to bottom, transparent, #C9A84C, #C9A84C, transparent);
            transform: translateX(-50%);
        }
        .event {
            position: relative;
            margin-bottom: 50px;
            display: flex;
            align-items: flex-start;
        }
        .event:nth-child(odd) { flex-direction: row; }
        .event:nth-child(even) { flex-direction: row-reverse; }
        .event .dot {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            width: 20px;
            height: 20px;
            background: #C9A84C;
            border-radius: 50%;
            box-shadow: 0 0 15px rgba(201,168,76,0.5);
            z-index: 2;
        }
        .event .content {
            width: 42%;
            padding: 20px 25px;
            background: rgba(30,58,95,0.3);
            border: 1px solid rgba(201,168,76,0.3);
            border-radius: 8px;
        }
        .event:nth-child(odd) .content { margin-right: auto; text-align: right; }
        .event:nth-child(even) .content { margin-left: auto; text-align: left; }
        .event .year {
            font-size: 32px;
            color: #C9A84C;
            font-weight: bold;
        }
        .event .desc {
            font-size: 22px;
            margin-top: 8px;
            line-height: 1.4;
        }
        .footer {
            position: absolute;
            bottom: 50px;
            text-align: center;
            width: 100%;
        }
        .footer .brand {
            font-size: 24px;
            color: #C9A84C;
            letter-spacing: 5px;
        }
        .divider {
            width: 200px;
            height: 2px;
            background: linear-gradient(to right, transparent, #C9A84C, transparent);
            margin: 15px auto;
        }
    </style>
</head>
<body>
    <div class="corner corner-tl"></div>
    <div class="corner corner-tr"></div>
    <div class="corner corner-bl"></div>
    <div class="corner corner-br"></div>
    <div class="frame"></div>
    <div class="title">
        <h1><!-- TIMELINE_TITLE --></h1>
        <div class="subtitle"><!-- TIMELINE_SUBTITLE --></div>
    </div>
    <div class="timeline">
        <div class="line"></div>
        <!-- Repetir .event para cada evento: -->
        <!--
        <div class="event">
            <div class="dot"></div>
            <div class="content">
                <div class="year">1ª Era, 1</div>
                <div class="desc">Descrição do evento</div>
            </div>
        </div>
        -->
    </div>
    <div class="footer">
        <div class="divider"></div>
        <div class="brand">🧙 SABEDORIA DE VALINOR</div>
    </div>
</body>
</html>
